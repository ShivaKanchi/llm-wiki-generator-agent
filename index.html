<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLM Wiki Generator</title>
    <style>
      :root {
        color-scheme: light;
        background: #f7fafc;
        color: #1f2937;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        line-height: 1.6;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        padding: 2rem;
      }

      .page-shell {
        max-width: 960px;
        width: 100%;
        background: white;
        border-radius: 24px;
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.12);
        overflow: hidden;
        border: 1px solid rgba(15, 23, 42, 0.08);
      }

      .page-header {
        padding: 2rem 2rem 1rem;
        border-bottom: 1px solid #e5e7eb;
        background: #f8fafc;
      }

      .page-header h1 {
        margin: 0;
        font-size: clamp(2rem, 2.5vw, 2.6rem);
        letter-spacing: -0.05em;
      }

      .page-header p {
        margin: 0.75rem 0 0;
        color: #4b5563;
        max-width: 42rem;
      }

      .content {
        padding: 2rem;
      }

      .content img,
      .content video,
      .content iframe {
        max-width: 100%;
      }

      .content h2,
      .content h3,
      .content h4 {
        margin-top: 2rem;
        margin-bottom: 1rem;
        color: #111827;
      }

      .content p,
      .content li,
      .content a,
      .content blockquote {
        color: #374151;
      }

      .content pre,
      .content code {
        background: #f3f4f6;
        border-radius: 0.5rem;
        padding: 0.4rem;
        overflow-x: auto;
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
      }

      .content pre {
        padding: 1rem;
        margin: 1.5rem 0;
      }

      .content ul,
      .content ol {
        padding-left: 1.5rem;
        margin: 1rem 0;
      }

      .content table {
        width: 100%;
        border-collapse: collapse;
        margin: 1.5rem 0;
      }

      .content table th,
      .content table td {
        border: 1px solid #d1d5db;
        padding: 0.75rem 1rem;
        text-align: left;
      }

      .content a {
        color: #2563eb;
        text-decoration: none;
      }

      .content a:hover {
        text-decoration: underline;
      }

      .status {
        margin-top: 1rem;
        color: #6b7280;
        font-size: 0.95rem;
        text-align: center;
      }

      .error {
        color: #b91c1c;
        background: #fef2f2;
        border: 1px solid #fecaca;
        border-radius: 0.75rem;
        padding: 1rem;
        margin: 1rem 0 0;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="page-shell">
      <main class="content" id="content">
        <p class="status">Loading...(≧∇≦)ﾉ</p>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      async function renderReadme() {
        try {
          const response = await fetch("README.md");
          if (!response.ok) {
            throw new Error(
              `Failed to fetch README.md: ${response.status} ${response.statusText}`,
            );
          }
          const markdown = await response.text();
          const html = marked.parse(markdown, {
            breaks: true,
            smartLists: true,
            smartypants: true,
          });
          const container = document.getElementById("content");
          container.innerHTML = html;
        } catch (error) {
          const container = document.getElementById("content");
          container.innerHTML = `<div class="error">(┬┬﹏┬┬)</div>`;
        }
      }
      renderReadme();
    </script>
  </body>
</html>
